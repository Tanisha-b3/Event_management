name: Terraform Infrastructure

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
  pull_request:
    paths:
      - 'terraform/**'
  workflow_dispatch:

env:
  TF_VERSION: '1.6'
  AWS_REGION: 'us-east-1'

permissions:
  contents: read

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: true

      - name: Initialize Terraform
        working-directory: terraform
        run: terraform init

      - name: Validate Terraform
        working-directory: terraform
        run: terraform validate

      - name: Plan Terraform
        working-directory: terraform
        id: plan
        run: terraform plan -no-color
        continue-on-error: true

      - name: Update Pull Request
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const output = `${{ steps.plan.outputs.stdout }}`;
            const body = output.length > 65000 ? output.slice(0, 65000) + '\n\n_(Truncated)_' : output;
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `#### 📊 Terraform Plan\n\n\`\`\`\n${body}\n\`\`\``
            })

      - name: Apply Terraform (Production)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: terraform
        run: terraform apply -auto-approve
        continue-on-error: true

      - name: Destroy Terraform (if failed)
        if: failure() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: terraform
        run: terraform destroy -auto-approve

      - name: Destroy Terraform (Manual)
        if: github.event_name == 'workflow_dispatch'
        working-directory: terraform
        run: terraform destroy -auto-approve