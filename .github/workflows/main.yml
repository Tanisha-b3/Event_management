name: Terraform terraform

on:
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_KEY }}
          aws-region: ap-south-1

      - name: Terraform Init
        run: cd terraform && terraform init

      - name: Terraform Apply
        run: |
          cd terraform
          terraform apply -auto-approve \
            -var="mongo_uri=${{ secrets.MONGO_URI }}" \
            -var="jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var="access_token_secret=${{ secrets.ACCESS_TOKEN_SECRET }}" \
            -var="refresh_token_secret=${{ secrets.REFRESH_TOKEN_SECRET }}" \
            -var="google_client_id=${{ secrets.GOOGLE_CLIENT_ID }}" \
            -var="client_secret=${{ secrets.CLIENT_SECRET }}" \
            -var="email=${{ secrets.EMAIL }}" \
            -var="twilio_sid=${{ secrets.TWILIO_ACCOUNT_SID }}" \
            -var="twilio_token=${{ secrets.TWILIO_AUTH_TOKEN }}" \
            -var="twilio_number=${{ secrets.TWILIO_PHONE_NUMBER }}" \
            -var="groq_api_key=${{ secrets.GROQ_API_KEY }}"
            -var="VITE_GOOGLE_CLIENT_ID=${{ secrets.VITE_GOOGLE_CLIENT_ID}}"
